<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="basic form">
    <link rel="stylesheet" href="style.css">
    <title>Basic Form</title>
</head>

<body>

    <header>

        <div class="container box1">
            <h1>Basic Form</h1>
        </div>

    </header>

    <main>
        <section class="form-section">

            <div class="container box1">
                <form action="">

                    <label for="fname">First Name :</label>
                    <input type="text" id="fname" name="fname" required><br><br>

                    <label for="lname">Last Name :</label>
                    <input type="text" id="lname" name="lname" required><br><br>


                    <label for="email">Email :</label>
                    <input type="email" id="email" name="email" required><br><br>

                    <label for="pass">Password :</label>
                    <input type="password" id="pass" name="pass" required><br><br>


                    <p>How would you rate your experience?</p>
                    <input type="radio" id="excellent" name="rating" value="excellent">
                    <label for="excellent">Excellent</label><br>

                    <input type="radio" id="good" name="rating" value="good">
                    <label for="good">Good</label><br>

                    <input type="radio" id="bad" name="rating" value="bad">
                    <label for="bad">Bad</label><br><br>

                    <p>Which features did you use?</p>
                    <input type="checkbox" id="blog" name="features" value="blog">
                    <label for="blog">Blog</label><br>


                    <input type="checkbox" id="forum" name="features" value="forum">
                    <label for="forum">Forum</label><br>


                    <input type="checkbox" id="doc" name="features" value="doc">
                    <label for="doc">Documentaion</label><br><br>

                    <p>What would you like us to improve?</p>
                    <select name="improve" id="improve">

                        <option value="design">Design</option>
                        <option value="navigation">Navigation</option>
                        <option value="documentation">Documentaion</option>
                        <option value="performance">Performance</option>

                    </select><br><br>

 <label for="comments">Additional Comments</label><br>
 <textarea name="comments" id="comments" cols="30" rows="5"></textarea><br><br>

 <button type="submit">Sahe your feedback</button>
 <button type="reset">Reset</button>

                </form>
            </div>


        </section>
    </main>


<footer>
    <div class="container box1"><br>
    <p>&copy;Abhinava Das, 2026</p>
    </div>
</footer>

</body>

</html>
